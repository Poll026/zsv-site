# zaharovsv.ru — статический лендинг
# Управляется вручную; через ISPmanager-панель этот домен НЕ добавлять
# Источник файлов: /opt/zaharov/app/ZSV/ (репо https://github.com/Poll026/zsv-site)

server {
    listen 80;
    listen [::]:80;
    server_name zaharovsv.ru www.zaharovsv.ru;

    root /opt/zaharov/app/ZSV;
    index index.html;

    server_tokens off;
    charset utf-8;

    access_log /var/log/nginx/zaharovsv.ru.access.log;
    error_log  /var/log/nginx/zaharovsv.ru.error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|webp|svg|woff|woff2|ttf|otf|eot|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\. { return 404; }
    location ~* \.(md|txt|sh|yml|yaml|lock|conf)$ { return 404; }
    location ^~ /docs/   { return 404; }
    location ^~ /deploy/ { return 404; }

    location / {
        try_files $uri $uri/ =404;
    }
}

# zaharovsv.ru -- static landing page (post-certbot full config)
# DO NOT add this domain via the ISPmanager web panel -- conflicts with this manual setup.
# Source files: /opt/zaharov/app/ZSV/ (repo: https://github.com/Poll026/zsv-site)
# Canonical host: zaharovsv.ru (apex). www.zaharovsv.ru returns 301 to apex.
#
# This file represents the FULL working config including SSL, after certbot ran.
# When deploying to a fresh server, the typical order is:
#   1. Run certbot --nginx -d <apex> -d <www> --email ... --agree-tos --no-eff-email
#      first (against a minimal http-only stub) to obtain certificates.
#   2. Then replace the file with this full config.
#   3. nginx -t && systemctl reload nginx.

# ---------------- HTTPS apex -- the actual site ----------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name zaharovsv.ru;

    root /opt/zaharov/app/ZSV;
    index index.html;

    server_tokens off;
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/zaharovsv.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zaharovsv.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/zaharovsv.ru.access.log;
    error_log  /var/log/nginx/zaharovsv.ru.error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|webp|svg|woff|woff2|ttf|otf|eot|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\. { return 404; }
    location ~* \.(md|txt|sh|yml|yaml|lock|conf)$ { return 404; }
    location ^~ /docs/   { return 404; }
    location ^~ /deploy/ { return 404; }

    location / {
        try_files $uri $uri/ =404;
    }
}

# ---------------- HTTPS www -- redirect to apex ----------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.zaharovsv.ru;

    ssl_certificate     /etc/letsencrypt/live/zaharovsv.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zaharovsv.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://zaharovsv.ru$request_uri;
}

# ---------------- HTTP -- redirect to HTTPS apex ----------------
# www over plain HTTP goes straight to https apex (single hop).
# apex over plain HTTP goes to https apex.
server {
    listen 80;
    listen [::]:80;
    server_name zaharovsv.ru www.zaharovsv.ru;

    if ($host = www.zaharovsv.ru) {
        return 301 https://zaharovsv.ru$request_uri;
    }

    return 301 https://zaharovsv.ru$request_uri;
}
